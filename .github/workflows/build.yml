name: Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.*'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
    - name: Package binaries
      run: |
        cd build/dist
        tar -czf ../../MCOverlayer_Linux_x64.tar.gz *
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: MCOverlayer_Linux_x64.tar.gz
        name: linux_x64
    - name: Upload to release
      uses: AButler/upload-release-assets@v2.0
      if: ${{ success() && startsWith(github.ref, 'refs/tags') }}
      with:
        files: MCOverlayer_Linux_x64.tar.gz
        repo-token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.*'
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(sysctl -n hw.ncpu)
    - name: Package binaries
      run: |
        cd build/dist
        tar -czf ../../MCOverlayer_macOS_x64.tar.gz *
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: MCOverlayer_macOS_x64.tar.gz
        name: macos_x64
    - name: Upload to release
      uses: AButler/upload-release-assets@v2.0
      if: ${{ success() && startsWith(github.ref, 'refs/tags') }}
      with:
        files: MCOverlayer_macOS_x64.tar.gz
        repo-token: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - msys2-arch: x86_64
            mingw-arch: mingw64
            package-arch: x64
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4
    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.mingw-arch }}
        update: true
    - name: Install build tools and Qt6
      run: pacman -S --noconfirm git zip mingw-w64-${{ matrix.msys2-arch }}-{gcc,cmake,ninja,qt6-base,qt6-tools}
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
    - name: Package binaries
      run: |
        cd build/dist
        zip -r ../../MCOverlayer_Windows_${{ matrix.package-arch }}.zip *
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: MCOverlayer_Windows_${{ matrix.package-arch }}.zip
        name: windows_${{ matrix.package-arch }}
    - name: Upload to release
      uses: AButler/upload-release-assets@v2.0
      if: ${{ success() && startsWith(github.ref, 'refs/tags') }}
      with:
        files: MCOverlayer_Windows_${{ matrix.package-arch }}.zip
        repo-token: ${{ secrets.GITHUB_TOKEN }}
